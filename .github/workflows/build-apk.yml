name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate Android native project
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_NO_GIT_STATUS: 1

      - name: Create assets directory
        run: mkdir -p android/app/src/main/assets

      - name: Bundle JS via expo export:embed (Expo 50 official method)
        run: |
          npx expo export:embed \
            --platform android \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res \
            --dev false \
            --reset-cache
          
          echo "Checking bundle file..."
          if [ -f "android/app/src/main/assets/index.android.bundle" ]; then
            echo "Bundle found: $(ls -lh android/app/src/main/assets/index.android.bundle)"
          else
            echo "ERROR: Bundle file not found at android/app/src/main/assets/index.android.bundle"
            exit 1
          fi
        env:
          NODE_ENV: production
          EXPO_ROUTER_APP_ROOT: src/app
          CI: true
          EXPO_PUBLIC_API_BASE_URL: ${{ secrets.EXPO_PUBLIC_API_BASE_URL || 'http://192.168.29.9:8000' }}

      - name: Make Gradlew executable
        run: chmod +x android/gradlew

      - name: Set ANDROID_SDK_ROOT for Gradle
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build standalone Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=false"
          NODE_ENV: production
          EXPO_ROUTER_APP_ROOT: src/app
          EXPO_PUBLIC_API_BASE_URL: ${{ secrets.EXPO_PUBLIC_API_BASE_URL || 'http://192.168.29.9:8000' }}

      - name: List APK output
        run: find android/app/build/outputs/apk -name "*.apk" -exec ls -lh {} \;

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BoxDesignAI-Standalone-v1.0
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
