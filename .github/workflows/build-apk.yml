name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies (clean)
        run: npm ci

      - name: Fix expo-modules-autolinking compatibility
        run: |
          npm install expo-modules-autolinking@1.11.3 --save-exact --legacy-peer-deps
          npm install @expo/prebuild-config@7.0.7 --save-exact --legacy-peer-deps

      - name: Generate Android native project
        run: |
          npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_NO_GIT_STATUS: 1

      - name: Make Gradlew executable
        run: chmod +x android/gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=false"

      - name: List APK output
        run: find android/app/build/outputs/apk -name "*.apk" -exec ls -lh {} \;

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BoxDesignAI-UAT-v1.0
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
