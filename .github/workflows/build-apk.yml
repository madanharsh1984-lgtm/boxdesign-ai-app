name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # allows you to trigger manually from GitHub UI with one click

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Setup Expo
        run: npx expo install --fix

      - name: Generate Android project
        run: npx expo prebuild --platform android --clean

      - name: Make Gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Sign APK (debug keystore for UAT)
        working-directory: android
        run: |
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore ~/.android/debug.keystore \
            -storepass android \
            -keypass android \
            app/build/outputs/apk/release/app-release-unsigned.apk \
            androiddebugkey -signedjar app/build/outputs/apk/release/app-release-signed.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: BoxDesignAI-UAT-v1.0.apk
          path: |
            android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Show APK info
        run: |
          echo "Build complete!"
          find android/app/build/outputs/apk -name "*.apk" -exec ls -lh {} \;
