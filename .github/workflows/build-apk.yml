name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies (clean)
        run: npm ci

      - name: Fix expo-modules-autolinking compatibility
        run: |
          npm install expo-modules-autolinking@1.11.3 --save-exact --legacy-peer-deps
          npm install @expo/prebuild-config@7.0.7 --save-exact --legacy-peer-deps

      - name: Generate Android native project (with bundled JS)
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_NO_GIT_STATUS: 1

      - name: Export JS bundle via Expo (standalone)
        run: |
          mkdir -p android/app/src/main/assets
          npx expo export \
            --platform android \
            --output-dir dist \
            --no-minify
          cp dist/_expo/static/js/android/*.js android/app/src/main/assets/index.android.bundle 2>/dev/null || \
          cp dist/bundles/android-*.js android/app/src/main/assets/index.android.bundle 2>/dev/null || \
          find dist -name "*.js" | head -1 | xargs -I{} cp {} android/app/src/main/assets/index.android.bundle
          echo "Bundle size: $(ls -lh android/app/src/main/assets/index.android.bundle)"
        env:
          NODE_ENV: production
          EXPO_ROUTER_APP_ROOT: src/app

      - name: Make Gradlew executable
        run: chmod +x android/gradlew

      - name: Set ANDROID_SDK_ROOT for Gradle
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build standalone Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=false"

      - name: List APK output
        run: find android/app/build/outputs/apk -name "*.apk" -exec ls -lh {} \;

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BoxDesignAI-Standalone-v1.0
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
